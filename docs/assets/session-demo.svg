<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
<title id="title">OrbitOps deterministic session-inspection demo</title>
<desc id="desc">A real installed OrbitOps workflow using the intermittent-loss link profile and thermal-demo alarm policy. 52 packets were received, 45 were decoded after 7 drops, 9 alarm transitions were recorded, and the final report was complete and compatible.</desc>
<style>
  .bg{fill:#07111f}.panel{fill:#0d1b2a;stroke:#26384d;stroke-width:1.5}
  .terminal{fill:#08131f;stroke:#2c425a;stroke-width:2}
  .title{fill:#f8fafc;font:700 30px ui-monospace,SFMono-Regular,Menlo,monospace}
  .subtitle{fill:#93a4b8;font:15px ui-monospace,SFMono-Regular,Menlo,monospace}
  .label{fill:#93a4b8;font:600 13px ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:1.5px}
  .value{fill:#f8fafc;font:700 44px ui-monospace,SFMono-Regular,Menlo,monospace}
  .metric{fill:#dbe7f3;font:600 16px ui-monospace,SFMono-Regular,Menlo,monospace}
  .detail{fill:#dbe7f3;font:14px ui-monospace,SFMono-Regular,Menlo,monospace}
  .context{fill:#93a4b8;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
  .evidence{fill:#f8fafc;font:700 21px ui-monospace,SFMono-Regular,Menlo,monospace}
  .small{fill:#93a4b8;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
  .ok{fill:#4ade80}.accent{fill:#38bdf8}.warn{fill:#fbbf24}
  .track{fill:#1d3045}.bar{fill:#38bdf8}
  .divider{stroke:#26384d;stroke-width:1.5}
  .arrow{stroke:#38bdf8;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>
<rect class="bg" width="1200" height="620" rx="24"/>
<rect class="terminal" x="32" y="32" width="1136" height="556" rx="24"/>
<text x="72" y="82" class="title">OrbitOps session inspection</text>
<text x="72" y="112" class="subtitle">deterministic installed workflow · real evidence · bounded operator preview</text>
<rect x="874" y="54" width="242" height="46" rx="23" fill="#123523" stroke="#2e8b57"/>
<text x="995" y="83" class="detail ok" text-anchor="middle">COMPLETE • COMPATIBLE</text>
<rect class="panel" x="66" y="151" width="330" height="190" rx="16"/>
<text x="90" y="182" class="label">LINK EMULATOR</text>
<text x="90" y="235" class="value">52</text>
<text x="90" y="267" class="metric">packets received</text>
<text x="90" y="294" class="detail">7 dropped · 45 forwarded</text>
<text x="90" y="317" class="context">intermittent-loss</text>
<text x="372" y="317" class="context accent" text-anchor="end">87%</text>
<rect class="track" x="90" y="324" width="282" height="8" rx="4"/>
<rect class="bar" x="90" y="324" width="244" height="8" rx="4"/>
<path class="arrow" d="M 402 255 H 417 M 411 249 L 417 255 L 411 261"/>
<rect class="panel" x="426" y="151" width="330" height="190" rx="16"/>
<text x="450" y="182" class="label">GROUND STATION</text>
<text x="450" y="235" class="value">45</text>
<text x="450" y="267" class="metric">validated telemetry</text>
<text x="450" y="304" class="detail warn">6 sequence gaps</text>
<text x="450" y="329" class="context">strict validation · JSONL v1</text>
<path class="arrow" d="M 762 255 H 777 M 771 249 L 777 255 L 771 261"/>
<rect class="panel" x="786" y="151" width="330" height="190" rx="16"/>
<text x="810" y="182" class="label">ALARM LIFECYCLE</text>
<text x="810" y="235" class="value">9</text>
<text x="810" y="267" class="metric">auditable transitions</text>
<text x="810" y="304" class="detail">8 raised · 1 updated</text>
<text x="810" y="329" class="context">thermal-demo · SAFE-mode entry</text>
<rect class="panel" x="66" y="375" width="1050" height="152" rx="16"/>
<text x="90" y="405" class="label">REPORT EVIDENCE</text>
<text x="90" y="455" class="evidence">248 timeline entries</text>
<line class="divider" x1="374" y1="426" x2="374" y2="474"/>
<text x="410" y="455" class="evidence">7 diagnostics</text>
<line class="divider" x1="624" y1="426" x2="624" y2="474"/>
<text x="660" y="455" class="evidence">16-entry preview</text>
<text x="90" y="497" class="small">Telemetry and alarms correlate by packet sequence; link evidence remains independent.</text>
<text x="72" y="562" class="small">OrbitOps 0.4.0</text>
<text x="600" y="562" class="small" text-anchor="middle">orbitops.session_report/v1</text>
<text x="1128" y="562" class="small" text-anchor="end">generated from validated demo output</text>
</svg>
