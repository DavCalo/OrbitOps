name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python tests
        run: python3 -m unittest discover -s tests -v

      - name: Configure C++ simulator
        run: cmake -S onboard -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ simulator
        run: cmake --build build --config Release

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Verify C++/Python protocol compatibility
        run: python3 scripts/integration_check.py ./build/orbitops_sim
