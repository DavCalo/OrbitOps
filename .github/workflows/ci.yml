name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orbitops-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python quality and package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install development tooling
        run: python -m pip install -e ".[dev]"

      - name: Lint and format-check Python
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Type-check Python
        run: python -m mypy ground_station tests scripts

      - name: Run Python tests with coverage
        run: |
          python -m coverage run -m unittest discover -s tests -v
          python -m coverage report

      - name: Build and smoke-test Python package
        run: |
          python -m build
          python -m pip install --force-reinstall dist/*.whl
          orbitops --version
          orbitops --help

  python-compatibility:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  cpp:
    name: C++17 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Configure C++ simulator
        run: >-
          cmake -S onboard -B build
          -DCMAKE_BUILD_TYPE=Release
          -DORBITOPS_WARNINGS_AS_ERRORS=ON

      - name: Build C++ simulator
        run: cmake --build build --config Release

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Verify C++ and Python interoperability
        run: python scripts/integration_check.py ./build/orbitops_sim

      - name: Smoke-test simulator CLI
        run: |
          ./build/orbitops_sim --version
          ./build/orbitops_sim --help

  sanitizers:
    name: C++ sanitizers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CC: gcc
      CXX: g++

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure sanitizer build
        run: >-
          cmake -S onboard -B build-sanitized
          -DCMAKE_BUILD_TYPE=Debug
          -DORBITOPS_WARNINGS_AS_ERRORS=ON
          -DORBITOPS_ENABLE_SANITIZERS=ON

      - name: Build and test with sanitizers
        run: |
          cmake --build build-sanitized
          ctest --test-dir build-sanitized --output-on-failure
