name: Bug report
description: Report reproducible incorrect behavior.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve OrbitOps. Do not include secrets or security vulnerabilities here.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: Include commands, scenario, and minimal input needed to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OrbitOps version or commit
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows through WSL
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
