name: Feature request
description: Propose a capability or product improvement.
title: "feat: "
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which user or engineering problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe observable behavior, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility
      options:
        - label: This may change the telemetry protocol.
        - label: This may change the command-line interface.
